<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="start-screen" id="startScreen">
            <h1>🎯 Quiz Master</h1>
            <p>Test your knowledge and see how much you know!</p>
            <div class="quiz-info">
                <p><strong>Total Questions:</strong> 5</p>
                <p><strong>Question Type:</strong> Multiple Choice</p>
                <p><strong>Time Limit:</strong> None</p>
                <p><strong>Difficulty:</strong> Medium</p>
            </div>
            <button class="btn" id="startBtn">Start Quiz</button>
        </div>
        <div class="quiz-screen" id="quizScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-header">
                <span class="question-number" id="questionNumber">Question 1 of 5</span>
                <span class="current-score" id="currentScore">Score: 0</span>
            </div>

            <div class="question-text" id="questionText">
                Sample question goes here?
            </div>

            <div class="feedback-message" id="feedbackMessage"></div>

            <div class="options" id="optionsContainer">
                <!-- Options will be inserted here by JavaScript -->
            </div>

            <button class="btn next-btn" id="nextBtn" disabled>Next Question</button>
        </div>

        <div class="results-screen" id="resultsScreen">
            <h1>Quiz Complete! 🎉</h1>
            <div class="results-container">
                <div class="score-circle">
                    <div class="score-text" id="finalScore">0%</div>
                </div>
                <div class="results-text" id="resultMessage">Great Job!</div>
                <div class="results-details">
                    <p><strong>Correct Answers:</strong> <span id="correctCount">0</span> out of <span id="totalCount">5</span></p>
                    <p><strong>Your Score:</strong> <span id="scorePercentage">0</span>%</p>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn" id="retakeBtn">Retake Quiz</button>
                <button class="btn btn-secondary" id="homeBtn">Back to Home</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
